name: tests

on:
  push:
  pull_request:

jobs:
  bun-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite (unit + non-DB integration)
        env:
          NODE_ENV: test
          SKIP_EXAMPLE_AUTH_TESTS: "1"
          SKIP_DATABASE_TESTS: "1"
          SKIP_MAILCATCHER_TESTS: "1"
        run: bun test

