volumes:
  db_data:

services:
  db:
    image: mariadb:11.4.7
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3377:3306"
    environment:
      MYSQL_DATABASE: example_auth
      MYSQL_USER: not_root
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: master_password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 1s
      retries: 5
